name: mcp-check
description: Audit MCP server configuration files without launching MCP servers
branding:
  icon: shield
  color: red
inputs:
  paths:
    description: Newline-separated JSON, YAML, or TOML MCP configuration paths
    required: true
  fail-on:
    description: Minimum severity that fails the check
    required: false
    default: high
  suppressions:
    description: Optional suppression file path
    required: false
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install mcp-check
      shell: bash
      run: python -m pip install .
    - name: Scan MCP configurations
      id: scan
      shell: bash
      env:
        MCP_CHECK_PATHS: ${{ inputs.paths }}
        MCP_CHECK_FAIL_ON: ${{ inputs.fail-on }}
        MCP_CHECK_SUPPRESSIONS: ${{ inputs.suppressions }}
      run: |
        set -euo pipefail
        mkdir -p mcp-check-results
        status=0
        while IFS= read -r path; do
          [ -z "$path" ] && continue
          name="$(basename "$path" .json)"
          args=(scan "$path" --format sarif --output "mcp-check-results/${name}.sarif" --fail-on "$MCP_CHECK_FAIL_ON")
          if [ -n "$MCP_CHECK_SUPPRESSIONS" ]; then
            args+=(--suppressions "$MCP_CHECK_SUPPRESSIONS")
          fi
          mcp-check "${args[@]}" || status=$?
        done <<< "$MCP_CHECK_PATHS"
        python - <<'PY'
        import json
        from pathlib import Path
        runs = []
        for path in Path("mcp-check-results").glob("*.sarif"):
            runs.extend(json.loads(path.read_text())["runs"])
        Path("mcp-check-results/results.sarif").write_text(json.dumps({"$schema": "https://json.schemastore.org/sarif-2.1.0.json", "version": "2.1.0", "runs": runs}, indent=2))
        PY
        echo "sarif=mcp-check-results/results.sarif" >> "$GITHUB_OUTPUT"
        exit "$status"
    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: mcp-check-results/results.sarif
outputs:
  sarif:
    description: Path to the generated SARIF report
    value: ${{ steps.scan.outputs.sarif }}
